# enable zmk studio for realtime keymap updates
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# Bluetooth
CONFIG_BT=y
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5

# Split keyboard BLE
CONFIG_ZMK_SPLIT_BLE=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Robust auto-reconnect on Apple/macOS (fixes cold BLE connect needing a USB reboot)
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Disable passkey entry (fixes pairing failures on macOS/Android)
CONFIG_ZMK_BLE_PASSKEY_ENTRY=n

# Battery reporting over BLE
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60

# Disable deep sleep (prevents right half from dying and not reconnecting)
CONFIG_ZMK_SLEEP=n

# Improve split reconnection
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=1
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# Increase BLE connection stability
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400
CONFIG_BT_BUF_ACL_TX_COUNT=16
CONFIG_BT_L2CAP_TX_BUF_COUNT=16
CONFIG_BT_BUF_ACL_TX_SIZE=251